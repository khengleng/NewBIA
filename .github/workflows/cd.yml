name: CD (Railway)

on:
  push:
    branches: [main, canary]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      core_backend: ${{ steps.filter.outputs.core_backend }}
      trade_api: ${{ steps.filter.outputs.trade_api }}
      identity_service: ${{ steps.filter.outputs.identity_service }}
      wallet_service: ${{ steps.filter.outputs.wallet_service }}
      document_service: ${{ steps.filter.outputs.document_service }}
      funding_service: ${{ steps.filter.outputs.funding_service }}
      market_service: ${{ steps.filter.outputs.market_service }}
      advisory_service: ${{ steps.filter.outputs.advisory_service }}
      twallet_bff_service: ${{ steps.filter.outputs.twallet_bff_service }}
      mobile_bot_service: ${{ steps.filter.outputs.mobile_bot_service }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workflow:
              - '.github/workflows/cd.yml'
            core_backend:
              - 'boutique-advisory-platform/core-backend/**'
            trade_api:
              - 'boutique-advisory-platform/trade-api/**'
            identity_service:
              - 'boutique-advisory-platform/identity-service/**'
            wallet_service:
              - 'boutique-advisory-platform/wallet-service/**'
            document_service:
              - 'boutique-advisory-platform/document-service/**'
            funding_service:
              - 'boutique-advisory-platform/funding-service/**'
            market_service:
              - 'boutique-advisory-platform/market-service/**'
            advisory_service:
              - 'boutique-advisory-platform/advisory-service/**'
            twallet_bff_service:
              - 'boutique-advisory-platform/twallet-bff-service/**'
            mobile_bot_service:
              - 'boutique-advisory-platform/mobile-bot-service/**'

  deploy:
    runs-on: ubuntu-latest
    needs: changes
    if: github.ref == 'refs/heads/main'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID: ${{ secrets[matrix.service_id_secret] }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core-backend
            path: boutique-advisory-platform/core-backend
            service_id_secret: RAILWAY_SERVICE_ID_CORE_BACKEND
            filter: core_backend
          - name: trade-api
            path: boutique-advisory-platform/trade-api
            service_id_secret: RAILWAY_SERVICE_ID_TRADE_API
            filter: trade_api
          - name: identity-service
            path: boutique-advisory-platform/identity-service
            service_id_secret: RAILWAY_SERVICE_ID_IDENTITY_SERVICE
            filter: identity_service
          - name: wallet-service
            path: boutique-advisory-platform/wallet-service
            service_id_secret: RAILWAY_SERVICE_ID_WALLET_SERVICE
            filter: wallet_service
          - name: document-service
            path: boutique-advisory-platform/document-service
            service_id_secret: RAILWAY_SERVICE_ID_DOCUMENT_SERVICE
            filter: document_service
          - name: funding-service
            path: boutique-advisory-platform/funding-service
            service_id_secret: RAILWAY_SERVICE_ID_FUNDING_SERVICE
            filter: funding_service
          - name: market-service
            path: boutique-advisory-platform/market-service
            service_id_secret: RAILWAY_SERVICE_ID_MARKET_SERVICE
            filter: market_service
          - name: advisory-service
            path: boutique-advisory-platform/advisory-service
            service_id_secret: RAILWAY_SERVICE_ID_ADVISORY_SERVICE
            filter: advisory_service
          - name: twallet-bff-service
            path: boutique-advisory-platform/twallet-bff-service
            service_id_secret: RAILWAY_SERVICE_ID_TWALLET_BFF
            filter: twallet_bff_service
          - name: mobile-bot-service
            path: boutique-advisory-platform/mobile-bot-service
            service_id_secret: RAILWAY_SERVICE_ID_MOBILE_BOT
            filter: mobile_bot_service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        if: env.RAILWAY_SERVICE_ID != '' && (needs.changes.outputs.workflow == 'true' || needs.changes.outputs[matrix.filter] == 'true')
        working-directory: ${{ matrix.path }}
        run: |
          echo "Deploying ${{ matrix.name }}..."
          railway up --service "$RAILWAY_SERVICE_ID" --detach

      - name: Skip (no changes)
        if: env.RAILWAY_SERVICE_ID != '' && needs.changes.outputs.workflow != 'true' && needs.changes.outputs[matrix.filter] != 'true'
        run: echo "Skipping ${{ matrix.name }} — no changes detected"

      - name: Skip (missing service id)
        if: env.RAILWAY_SERVICE_ID == ''
        run: echo "Skipping ${{ matrix.name }} — missing secret ${{ matrix.service_id_secret }}"

  migrations:
    runs-on: ubuntu-latest
    needs: [deploy, changes]
    if: github.ref == 'refs/heads/main'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID: ${{ secrets[matrix.service_id_secret] }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core-backend
            path: boutique-advisory-platform/core-backend
            service_id_secret: RAILWAY_SERVICE_ID_CORE_BACKEND
            filter: core_backend
          - name: trade-api
            path: boutique-advisory-platform/trade-api
            service_id_secret: RAILWAY_SERVICE_ID_TRADE_API
            filter: trade_api
          - name: identity-service
            path: boutique-advisory-platform/identity-service
            service_id_secret: RAILWAY_SERVICE_ID_IDENTITY_SERVICE
            filter: identity_service
          - name: wallet-service
            path: boutique-advisory-platform/wallet-service
            service_id_secret: RAILWAY_SERVICE_ID_WALLET_SERVICE
            filter: wallet_service
          - name: document-service
            path: boutique-advisory-platform/document-service
            service_id_secret: RAILWAY_SERVICE_ID_DOCUMENT_SERVICE
            filter: document_service
          - name: funding-service
            path: boutique-advisory-platform/funding-service
            service_id_secret: RAILWAY_SERVICE_ID_FUNDING_SERVICE
            filter: funding_service
          - name: market-service
            path: boutique-advisory-platform/market-service
            service_id_secret: RAILWAY_SERVICE_ID_MARKET_SERVICE
            filter: market_service
          - name: advisory-service
            path: boutique-advisory-platform/advisory-service
            service_id_secret: RAILWAY_SERVICE_ID_ADVISORY_SERVICE
            filter: advisory_service
          - name: twallet-bff-service
            path: boutique-advisory-platform/twallet-bff-service
            service_id_secret: RAILWAY_SERVICE_ID_TWALLET_BFF
            filter: twallet_bff_service
          - name: mobile-bot-service
            path: boutique-advisory-platform/mobile-bot-service
            service_id_secret: RAILWAY_SERVICE_ID_MOBILE_BOT
            filter: mobile_bot_service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Run Prisma Migrations
        if: env.RAILWAY_SERVICE_ID != '' && (needs.changes.outputs.workflow == 'true' || needs.changes.outputs[matrix.filter] == 'true')
        working-directory: ${{ matrix.path }}
        run: |
          echo "Running migrations for ${{ matrix.name }}..."
          railway run --service "$RAILWAY_SERVICE_ID" -- npx prisma migrate deploy

      - name: Skip (no changes)
        if: env.RAILWAY_SERVICE_ID != '' && needs.changes.outputs.workflow != 'true' && needs.changes.outputs[matrix.filter] != 'true'
        run: echo "Skipping migrations for ${{ matrix.name }} — no changes detected"

      - name: Skip (missing service id)
        if: env.RAILWAY_SERVICE_ID == ''
        run: echo "Skipping migrations for ${{ matrix.name }} — missing secret ${{ matrix.service_id_secret }}"

  deploy_canary:
    runs-on: ubuntu-latest
    needs: changes
    if: github.ref == 'refs/heads/canary'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID: ${{ secrets[matrix.service_id_secret] }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core-backend
            path: boutique-advisory-platform/core-backend
            service_id_secret: RAILWAY_SERVICE_ID_CORE_BACKEND_CANARY
            filter: core_backend
          - name: trade-api
            path: boutique-advisory-platform/trade-api
            service_id_secret: RAILWAY_SERVICE_ID_TRADE_API_CANARY
            filter: trade_api
          - name: identity-service
            path: boutique-advisory-platform/identity-service
            service_id_secret: RAILWAY_SERVICE_ID_IDENTITY_SERVICE_CANARY
            filter: identity_service
          - name: wallet-service
            path: boutique-advisory-platform/wallet-service
            service_id_secret: RAILWAY_SERVICE_ID_WALLET_SERVICE_CANARY
            filter: wallet_service
          - name: document-service
            path: boutique-advisory-platform/document-service
            service_id_secret: RAILWAY_SERVICE_ID_DOCUMENT_SERVICE_CANARY
            filter: document_service
          - name: funding-service
            path: boutique-advisory-platform/funding-service
            service_id_secret: RAILWAY_SERVICE_ID_FUNDING_SERVICE_CANARY
            filter: funding_service
          - name: market-service
            path: boutique-advisory-platform/market-service
            service_id_secret: RAILWAY_SERVICE_ID_MARKET_SERVICE_CANARY
            filter: market_service
          - name: advisory-service
            path: boutique-advisory-platform/advisory-service
            service_id_secret: RAILWAY_SERVICE_ID_ADVISORY_SERVICE_CANARY
            filter: advisory_service
          - name: twallet-bff-service
            path: boutique-advisory-platform/twallet-bff-service
            service_id_secret: RAILWAY_SERVICE_ID_TWALLET_BFF_CANARY
            filter: twallet_bff_service
          - name: mobile-bot-service
            path: boutique-advisory-platform/mobile-bot-service
            service_id_secret: RAILWAY_SERVICE_ID_MOBILE_BOT_CANARY
            filter: mobile_bot_service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy (Canary)
        if: env.RAILWAY_SERVICE_ID != '' && (needs.changes.outputs.workflow == 'true' || needs.changes.outputs[matrix.filter] == 'true')
        working-directory: ${{ matrix.path }}
        run: |
          echo "Deploying CANARY ${{ matrix.name }}..."
          railway up --service "$RAILWAY_SERVICE_ID" --detach

      - name: Skip (no changes)
        if: env.RAILWAY_SERVICE_ID != '' && needs.changes.outputs.workflow != 'true' && needs.changes.outputs[matrix.filter] != 'true'
        run: echo "Skipping CANARY ${{ matrix.name }} — no changes detected"

      - name: Skip (missing service id)
        if: env.RAILWAY_SERVICE_ID == ''
        run: echo "Skipping CANARY ${{ matrix.name }} — missing secret ${{ matrix.service_id_secret }}"

  migrations_canary:
    runs-on: ubuntu-latest
    needs: [deploy_canary, changes]
    if: github.ref == 'refs/heads/canary'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID: ${{ secrets[matrix.service_id_secret] }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core-backend
            path: boutique-advisory-platform/core-backend
            service_id_secret: RAILWAY_SERVICE_ID_CORE_BACKEND_CANARY
            filter: core_backend
          - name: trade-api
            path: boutique-advisory-platform/trade-api
            service_id_secret: RAILWAY_SERVICE_ID_TRADE_API_CANARY
            filter: trade_api
          - name: identity-service
            path: boutique-advisory-platform/identity-service
            service_id_secret: RAILWAY_SERVICE_ID_IDENTITY_SERVICE_CANARY
            filter: identity_service
          - name: wallet-service
            path: boutique-advisory-platform/wallet-service
            service_id_secret: RAILWAY_SERVICE_ID_WALLET_SERVICE_CANARY
            filter: wallet_service
          - name: document-service
            path: boutique-advisory-platform/document-service
            service_id_secret: RAILWAY_SERVICE_ID_DOCUMENT_SERVICE_CANARY
            filter: document_service
          - name: funding-service
            path: boutique-advisory-platform/funding-service
            service_id_secret: RAILWAY_SERVICE_ID_FUNDING_SERVICE_CANARY
            filter: funding_service
          - name: market-service
            path: boutique-advisory-platform/market-service
            service_id_secret: RAILWAY_SERVICE_ID_MARKET_SERVICE_CANARY
            filter: market_service
          - name: advisory-service
            path: boutique-advisory-platform/advisory-service
            service_id_secret: RAILWAY_SERVICE_ID_ADVISORY_SERVICE_CANARY
            filter: advisory_service
          - name: twallet-bff-service
            path: boutique-advisory-platform/twallet-bff-service
            service_id_secret: RAILWAY_SERVICE_ID_TWALLET_BFF_CANARY
            filter: twallet_bff_service
          - name: mobile-bot-service
            path: boutique-advisory-platform/mobile-bot-service
            service_id_secret: RAILWAY_SERVICE_ID_MOBILE_BOT_CANARY
            filter: mobile_bot_service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Run Prisma Migrations (Canary)
        if: env.RAILWAY_SERVICE_ID != '' && (needs.changes.outputs.workflow == 'true' || needs.changes.outputs[matrix.filter] == 'true')
        working-directory: ${{ matrix.path }}
        run: |
          echo "Running CANARY migrations for ${{ matrix.name }}..."
          railway run --service "$RAILWAY_SERVICE_ID" -- npx prisma migrate deploy

      - name: Skip (no changes)
        if: env.RAILWAY_SERVICE_ID != '' && needs.changes.outputs.workflow != 'true' && needs.changes.outputs[matrix.filter] != 'true'
        run: echo "Skipping CANARY migrations for ${{ matrix.name }} — no changes detected"

      - name: Skip (missing service id)
        if: env.RAILWAY_SERVICE_ID == ''
        run: echo "Skipping CANARY migrations for ${{ matrix.name }} — missing secret ${{ matrix.service_id_secret }}"
