name: Build TWallet Flutter App

on:
  push:
    paths:
      - 'twallet-app/**'
      - '.github/workflows/twallet-flutter.yml'
  pull_request:
    paths:
      - 'twallet-app/**'
      - '.github/workflows/twallet-flutter.yml'
  workflow_dispatch:

jobs:
  flutter-build:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.14.0'
          channel: stable
          cache: pub

      - name: Install dependencies
        working-directory: twallet-app
        run: flutter pub get

      - name: Run Flutter analyze
        working-directory: twallet-app
        run: flutter analyze

      - name: Run Flutter tests
        working-directory: twallet-app
        run: flutter test --no-codesign

      - name: Build Android release artifacts
        working-directory: twallet-app
        run: |
          flutter build appbundle --release
          flutter build apk --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twallet-android-release
          path: |
            twallet-app/build/app/outputs/bundle/release/app-release.aab
            twallet-app/build/app/outputs/flutter-apk/app-release.apk

      - name: Build Flutter web preview
        working-directory: twallet-app
        run: flutter build web --release

      - name: Deploy web preview to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: twallet-app/build/web

      - name: Print preview URL
        run: echo "Preview will be available (after Pages is enabled) at https://khengleng.github.io/BIA/"
